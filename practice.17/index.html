<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Effect UI Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
    <h1>Multi-Effect UI Showcase</h1>
    <p>All sections styled using Hover, Transform & Transition</p>
</div>


<h2 class="title">Layered Profile Cards</h2>

<div class="cards">

<div class="card">
    <img src="https://randomuser.me/api/portraits/women/45.jpg">
    <h2>Alice</h2>
    <p>UI/UX Designer</p>
</div>

<div class="card">
    <img src="https://randomuser.me/api/portraits/men/65.jpg">
    <h2>Bob</h2>
    <p>Full Stack Developer</p>
</div>

</div>

<h2 class="title">Quiz Flashcards</h2>

<div class="flashcards">
    <div class="flash">What is HTML?</div>
    <div class="flash">What is CSS?</div>
</div>

<h2 class="title">Creative Buttons</h2>

<div class="buttons">
    <button class="slide-btn">Slide Button</button>
    <button class="glow-btn">Glow Button</button>
</div>

<h2 class="title">Interactive Image Gallery</h2>

<div class="gallery">

    <img src="https://picsum.photos/id/1040/400/300">

    <img src="https://picsum.photos/id/1035/400/300">

    <img src="https://picsum.photos/id/1032/400/300">

</div>

</body>
</html>
