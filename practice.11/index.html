<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiant Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    
    <div class="top-section">
        <h2>Welcome to the Parallax World</h2>
        <p>Linear Gradient Section</p>
    </div>

    <div class="linear">
        <p>Radial Gradient Section</p>
    </div>

    <div class="radial">
        <p>Conic Gradient Section</p>
    </div>

    <div class="conic"></div>

    <div class="footer-text">
        This Demo uses css Gradients, backgrounds and typography.
    </div>

    <div class="parent-box">
        <h3>Parent Box Heading</h3>
        <p>This is a simple container box with aligned content.</p>
    </div>

</div>
    
</body>
</html>
