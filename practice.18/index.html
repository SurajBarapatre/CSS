<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Display Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <h2>🧪 Layout Lab: Product Display Toggle Grid</h2>

<div class="products">

<div class="card">
    <img src="smartwatch.jpg" alt="Smart Watch">
    <h3>Smart Watch</h3>
    <p>$99.99</p>
</div>

<div class="card">
    <img src="headphones.webp" alt="Headphones">
    <h3>Wireless Headphones</h3>
    <p>$89.00</p>
</div>

<div class="card">
    <img src="fitness band.jpg" alt="Fitness Band">
    <h3>Fitness Band</h3>
    <p>$79.99</p>
</div>

</div>
</div>

</body>
</html>
