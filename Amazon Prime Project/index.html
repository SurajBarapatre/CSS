<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Video webpage 
</title>
<link rel="stylesheet" href="style.css">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>

<header>
    <div class="logo">prime video</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Free to me</a>
        <a href="#">Movies</a>
        <a href="#">TV Shows</a>
        <a href="#">Live TV</a>
        <a href="#">Subscriptions</a>
    </nav>

    <div class="icons">
        <i class="fas fa-search"></i>
        <i class="fas fa-globe"></i>
        <i class="fas fa-user-circle"></i>
        <button>Join Prime</button>
    </div>
</header>

<section class="banner">
    <div class="overlay">
        <h1>SPIDER-NOIR</h1>

        <p>
            English | Hindi | Tamil | Telugu
            <br>
            Malayalam | Kannada
        </p>

        <div class="india">
            <i class="fa-solid fa-circle-check"></i>
            #2 in India
        </div>

        <div class="buttons">
            <button class="join">Join Prime</button>
            <button class="<i class="ri-add-circle-line"></i>"></button>
            <button class="info">
                <i class="fa-solid fa-circle-info"></i>
            </button>
        </div>
    </div>
</section>

<section class="row">
    <h2>Top 10 TV Shows in India</h2>

    <div class="cards">

            <img src="images/show1.jpg">
